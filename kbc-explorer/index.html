              displayText = matchText.substring(0, lIdx)
                + '\u00AB' + matchText.substring(lIdx, lIdx + q.length) + '\u00BB'
                + matchText.substring(lIdx + q.length);
            }
            item.appendChild(h('span', {className: 'dd-match'}, displayText));
          }

          item.dataset.alias = r.alias;
          item.addEventListener('click', (ev) => {
            ev.stopPropagation();
            selectSearchResult(r.alias);
          });

          dropdown.appendChild(item);
          ddItems.push(item);
          totalShown++;
        }
      }

      if (totalShown === 0) {
        dropdown.appendChild(h('div', {className: 'dd-empty'}, 'No matching projects, configs, or buckets found.'));
      }

      // Update info panel with count
      const projectCount = matchAliases.size;
      if (projectCount > 0) {
        infoPanel.classList.add('visible');
        infoPanel.textContent = `Found ${totalShown} result${totalShown !== 1 ? 's' : ''} across ${projectCount} project${projectCount !== 1 ? 's' : ''} - click a result or press Enter`;
      } else {
        infoPanel.classList.add('visible');
        infoPanel.textContent = 'No matching results found.';
      }

      dropdown.classList.add('open');
    }

    function selectSearchResult(alias) {
      dropdown.classList.remove('open');
      dropdown.innerHTML = '';
      ddItems = [];
      ddActiveIdx = -1;

      // Zoom to node
      const ne = nodeElements.find(n => n.data.alias === alias);
      if (ne) {
        const svgRect = svg.getBoundingClientRect();
        const sw = svgRect.width || W;
        const sh = svgRect.height || H;
        zoom = 1.5;
        panX = (sw / 2) - ne.data.x * zoom;
        panY = (sh / 2) - ne.data.y * zoom;
        applyTransform(true);

        clearAllHighlights();
        highlightPath(alias);
      }
    }

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const q = searchInput.value.trim().toLowerCase();
        searchAndShowResults(q);
      }, 150);
    });

    searchInput.addEventListener('keydown', (ev) => {
      if (ev.key === 'ArrowDown') {
        ev.preventDefault();
        if (ddItems.length > 0) {
          ddActiveIdx = Math.min(ddActiveIdx + 1, ddItems.length - 1);
          ddItems.forEach((it, i) => it.classList.toggle('active', i === ddActiveIdx));
          ddItems[ddActiveIdx]?.scrollIntoView({ block: 'nearest' });
        }
      } else if (ev.key === 'ArrowUp') {
        ev.preventDefault();
        if (ddItems.length > 0) {
          ddActiveIdx = Math.max(ddActiveIdx - 1, 0);
          ddItems.forEach((it, i) => it.classList.toggle('active', i === ddActiveIdx));
          ddItems[ddActiveIdx]?.scrollIntoView({ block: 'nearest' });
        }
      } else if (ev.key === 'Enter') {
        ev.preventDefault();
        if (ddActiveIdx >= 0 && ddItems[ddActiveIdx]) {
          selectSearchResult(ddItems[ddActiveIdx].dataset.alias);
        } else if (ddItems.length > 0) {
          selectSearchResult(ddItems[0].dataset.alias);
        }
      } else if (ev.key === 'Escape') {
        dropdown.classList.remove('open');
        dropdown.innerHTML = '';
        ddItems = [];
        ddActiveIdx = -1;
        searchInput.value = '';
        clearAllHighlights();
        searchInput.blur();
      }
    });

    // Close dropdown on outside click
    document.addEventListener('click', (ev) => {
      if (!searchWrap.contains(ev.target)) {
        dropdown.classList.remove('open');
      }
    });

    // ========================================================
    // EDGE HOVER TOOLTIP
    // ========================================================
    for (const ee of edgeElements) {
      ee.el.style.cursor = 'default';
      ee.el.addEventListener('mouseenter', (ev) => {
        if (selectedNode) return;
        const s = nodeMap[ee.data.source];
        const t = nodeMap[ee.data.target];
        tooltip.innerHTML = `<strong>${s?.name || ee.data.source} \u2192 ${t?.name || ee.data.target}</strong><br>
          <div style="margin-top:4px;font-size:11px;color:var(--text-dim)">
          ${ee.data.buckets.map(b => `<code style="font-size:10px;display:block;margin:1px 0">${b}</code>`).join('')}
          </div>`;
        tooltip.style.display = 'block';
      });
      ee.el.addEventListener('mousemove', (ev) => {
        const cr = container.getBoundingClientRect();
        tooltip.style.left = (ev.clientX - cr.left + 14) + 'px';
        tooltip.style.top = (ev.clientY - cr.top + 14) + 'px';
      });
      ee.el.addEventListener('mouseleave', () => {
        if (selectedNode) return;
        tooltip.style.display = 'none';
      });
    }

    // Initial fit
    requestAnimationFrame(() => {
      fitAll();
    });
  }

  // Matrix link - scrolls to project section within the matrix page
  function matrixLink(alias, fallbackName) {
    const proj = CATALOG.projects[alias];
    const name = proj ? proj.name : (fallbackName || alias || 'Unknown');
    const inCatalog = !!proj;
    const el = h('span', {className: 'project-link'}, name);
    if (inCatalog) {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const target = document.getElementById('matrix-' + alias);
        if (target) {
          target.scrollIntoView({behavior: 'smooth', block: 'start'});
          target.style.boxShadow = '0 0 0 2px var(--accent)';
          setTimeout(() => { target.style.boxShadow = ''; }, 1500);
        }
      });
    } else {
      el.style.cursor = 'default';
      el.style.color = 'var(--text)';
    }
    return el;
  }

  // Sharing matrix view - per project: what goes out, what comes in
  function renderMatrix() {
    const main = $('main');
    main.innerHTML = '';
    main.appendChild(h('div', {className: 'page-title'}, 'Data Sharing Matrix'));
    main.appendChild(h('div', {className: 'page-subtitle'},
      'Per-project view of all data sharing - click project names to scroll'));

    const allAliases = [...CATALOG.tiers.L0.projects, ...CATALOG.tiers.L1.projects, ...CATALOG.tiers.L2.projects];

    for (const alias of allAliases) {
      const p = CATALOG.projects[alias];
      const outShares = p.sharing_out || [];
      const inShares = p.sharing_in || [];
      if (outShares.length === 0 && inShares.length === 0) continue;

      const section = h('div', {className: 'section', id: 'matrix-' + alias});
      section.style.transition = 'box-shadow 0.3s';

      // Section header - click navigates to project detail
      const header = h('div', {className: 'section-header', style: 'cursor:pointer'},
        h('span', {className: `badge badge-${p.tier.toLowerCase()}`}, p.tier),
        ' '
      );
      header.appendChild(projectLink(alias));
      header.appendChild(h('span', {style: 'margin-left:auto;font-size:12px;color:var(--text-dim)'},
        `${outShares.length} out / ${inShares.length} in`));
      section.appendChild(header);

      const body = h('div', {className: 'section-body', style: 'padding:0'});

      // Sharing Out table
      if (outShares.length > 0) {
        body.appendChild(h('div', {style: 'padding:10px 16px 4px;font-size:12px;font-weight:600;color:var(--green)'},
          '\u2192 Shares Out (' + outShares.length + ')'));

        const outGrouped = {};
        for (const s of outShares) {
          const key = s.target_project || s.target_project_name || 'unknown';
          if (!outGrouped[key]) outGrouped[key] = {shares: [], name: s.target_project_name};
          outGrouped[key].shares.push(s);
        }

        const outTbody = h('tbody');
        for (const [tgtAlias, grp] of Object.entries(outGrouped).sort((a,b) => a[0].localeCompare(b[0]))) {
          const tgtProj = CATALOG.projects[tgtAlias];
          const tgtTier = tgtProj?.tier;
          for (let i = 0; i < grp.shares.length; i++) {
            const s = grp.shares[i];
            outTbody.appendChild(h('tr', {},
              i === 0 ? h('td', {rowspan: String(grp.shares.length), style: 'vertical-align:top'},
                tgtTier ? h('span', {className: `badge badge-${tgtTier.toLowerCase()}`, style: 'margin-right:6px'}, tgtTier) : null,
                matrixLink(tgtAlias, grp.name)
              ) : null,
              h('td', {}, h('code', {style: 'font-size:11px'}, s.bucket || s.source_bucket || '')),
              h('td', {style: 'color:var(--text-dim)'}, '\u2192'),
              h('td', {}, h('code', {style: 'font-size:11px'}, s.target_bucket || '')),
              h('td', {}, h('span', {style: 'font-size:11px;color:var(--accent)'}, s.sharing_type || ''))
            ));
          }
        }

        body.appendChild(h('table', {},
          h('thead', {}, h('tr', {},
            h('th', {}, 'Target Project'),
            h('th', {}, 'Source Bucket'),
            h('th', {}, ''),
            h('th', {}, 'Target Bucket'),
            h('th', {}, 'Type'),
          )),
          outTbody
        ));
      }

      // Sharing In table
      if (inShares.length > 0) {
        body.appendChild(h('div', {style: 'padding:10px 16px 4px;font-size:12px;font-weight:600;color:var(--accent)'},
          '\u2190 Receives In (' + inShares.length + ')'));

        const inGrouped = {};
        for (const s of inShares) {
          const key = s.source_project || s.source_project_name || 'unknown';
          if (!inGrouped[key]) inGrouped[key] = {shares: [], name: s.source_project_name};
          inGrouped[key].shares.push(s);
        }

        const inTbody = h('tbody');
        for (const [srcAlias, grp] of Object.entries(inGrouped).sort((a,b) => a[0].localeCompare(b[0]))) {
          const srcProj = CATALOG.projects[srcAlias];
          const srcTier = srcProj?.tier;
          for (let i = 0; i < grp.shares.length; i++) {
            const s = grp.shares[i];
            inTbody.appendChild(h('tr', {},
              i === 0 ? h('td', {rowspan: String(grp.shares.length), style: 'vertical-align:top'},
                srcTier ? h('span', {className: `badge badge-${srcTier.toLowerCase()}`, style: 'margin-right:6px'}, srcTier) : null,
                matrixLink(srcAlias, grp.name)
              ) : null,
              h('td', {}, h('code', {style: 'font-size:11px'}, s.source_bucket || '')),
              h('td', {style: 'color:var(--text-dim)'}, '\u2192'),
              h('td', {}, h('code', {style: 'font-size:11px'}, s.bucket || s.target_bucket || '')),
              h('td', {}, h('span', {style: 'font-size:11px;color:var(--accent)'}, s.sharing_type || ''))
            ));
          }
        }

        body.appendChild(h('table', {},
          h('thead', {}, h('tr', {},
            h('th', {}, 'Source Project'),
            h('th', {}, 'Source Bucket'),
            h('th', {}, ''),
            h('th', {}, 'Target Bucket'),
            h('th', {}, 'Type'),
          )),
          inTbody
        ));
      }

      section.appendChild(body);
      main.appendChild(section);
    }
  }

  // Router
  function renderView() {
    switch (currentView) {
      case 'dashboard': renderDashboard(); break;
      case 'project': renderProjectDetail(currentProject); break;
      case 'lineage': renderLineageGraph(); break;
      case 'matrix': renderMatrix(); break;
    }
  }

  // Init
  $('search').addEventListener('input', (e) => buildNav(e.target.value));

  buildNav('');
  renderDashboard();
})();
</script>
</body>
