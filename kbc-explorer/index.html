<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBC Explorer - Keboola Project Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F7FA;
    --bg-card: #FFFFFF;
    --bg-hover: rgba(243, 244, 246, 0.5);
    --border: #E5E7EB;
    --border-light: #F3F4F6;
    --text: #1A253C;
    --text-dim: #6B7280;
    --accent: #0073D1;
    --accent-light: rgba(0, 115, 209, 0.1);
    --accent-dim: rgba(0, 115, 209, 0.15);
    --green: #10B77F;
    --red: #EA580C;
    --orange: #F59F0A;
    --yellow: #F59F0A;
    --purple: #7C3AED;
    --cyan: #0891B2;
    --l0: #0073D1;
    --l1: #7C3AED;
    --l2: #10B77F;
    --shadow-sm: rgba(0, 0, 0, 0.05) 0px 1px 2px 0px;
    --shadow-md: rgba(0, 0, 0, 0.1) 0px 1px 3px 0px, rgba(0, 0, 0, 0.1) 0px 1px 2px -1px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overflow-x: hidden;
    font-size: 14px;
  }

  /* Layout */
  .app { display: flex; height: 100vh; }

  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .sidebar-header .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .search-box {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
  }

  .search-box input {
    width: 100%;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }

  .search-box input:focus { border-color: var(--accent); }

  .nav-section {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .nav-group-label {
    padding: 8px 16px 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }

  .nav-group-label .dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
  }

  .nav-group-label .count {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .nav-item {
    padding: 5px 16px 5px 28px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nav-item:hover { background: var(--bg-hover); }
  .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }

  .nav-item .health {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0;
  }

  .nav-item .nav-label {
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nav-special {
    padding: 5px 16px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
    font-weight: 500;
  }

  .nav-special:hover { background: var(--bg-hover); }
  .nav-special.active { background: var(--accent-light); color: var(--accent); }

  /* Main content */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .page-subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  /* KPI cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    box-shadow: var(--shadow-sm);
  }

  .kpi-card .kpi-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }

  .kpi-card .kpi-value {
    font-size: 28px;
    font-weight: 700;
  }

  .kpi-card .kpi-detail {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Sections */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .section-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-body { padding: 16px 18px; }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    background: var(--bg);
  }

  td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg-hover); }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-extractor { background: rgba(0, 115, 209, 0.1); color: var(--accent); }
  .badge-writer { background: rgba(16, 183, 127, 0.1); color: var(--green); }
  .badge-transformation { background: rgba(124, 58, 237, 0.1); color: var(--purple); }
  .badge-application { background: rgba(245, 159, 10, 0.1); color: var(--orange); }
  .badge-other { background: var(--border-light); color: var(--text-dim); }

  .badge-success { background: rgba(16, 183, 127, 0.1); color: var(--green); }
  .badge-error { background: rgba(234, 88, 12, 0.1); color: var(--red); }
  .badge-warning { background: rgba(245, 159, 10, 0.1); color: var(--orange); }

  .badge-l0 { background: rgba(0, 115, 209, 0.1); color: var(--l0); }
  .badge-l1 { background: rgba(124, 58, 237, 0.1); color: var(--l1); }
  .badge-l2 { background: rgba(16, 183, 127, 0.1); color: var(--l2); }

  /* Progress bar */
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    width: 100%;
  }

  .progress-bar .fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .tab {
    padding: 10px 18px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); font-weight: 500; border-bottom-color: var(--accent); }

  /* Lineage graph */
  .lineage-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    box-shadow: var(--shadow-sm);
  }

  .lineage-toolbar button {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
  }

  .lineage-toolbar button:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
  }

  .lineage-toolbar .separator {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }

  .lineage-search {
    flex: 1;
    max-width: 280px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 10px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }

  .lineage-search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-light);
  }

  .lineage-search::placeholder {
    color: var(--text-dim);
  }

  .lineage-search-wrap {
    position: relative;
    flex: 1;
    max-width: 380px;
  }

  .lineage-search-wrap .lineage-search {
    width: 100%;
    max-width: none;
  }

  .lineage-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    margin-top: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow-md);
    max-height: 340px;
    overflow-y: auto;
    z-index: 200;
    display: none;
    font-size: 12px;
  }

  .lineage-dropdown.open {
    display: block;
  }

  .lineage-dropdown .dd-group-label {
    padding: 6px 10px 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    background: var(--bg);
    border-bottom: 1px solid var(--border-light);
    position: sticky;
    top: 0;
  }

  .lineage-dropdown .dd-item {
    padding: 6px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s;
  }

  .lineage-dropdown .dd-item:hover,
  .lineage-dropdown .dd-item.active {
    background: var(--accent-light);
  }

  .lineage-dropdown .dd-item .dd-project {
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }

  .lineage-dropdown .dd-item .dd-match {
    color: var(--text-dim);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .lineage-dropdown .dd-item .dd-tier {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    color: white;
    flex-shrink: 0;
  }

  .lineage-dropdown .dd-empty {
    padding: 12px 10px;
    color: var(--text-dim);
    text-align: center;
  }

  .lineage-container {
    position: relative;
    width: 100%;
    height: calc(100vh - 260px);
    min-height: 500px;
    background: var(--bg-card);
    border-radius: 0 0 8px 8px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    cursor: grab;
  }

  .lineage-container.panning {
    cursor: grabbing;
  }

  .lineage-container svg {
    width: 100%;
    height: 100%;
  }

  .lineage-tooltip {
    position: absolute;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 100;
    max-width: 320px;
    box-shadow: var(--shadow-md);
    line-height: 1.6;
  }

  .lineage-tooltip strong {
    font-size: 13px;
    color: var(--text);
  }

  .lineage-tooltip .tip-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    color: var(--text-dim);
  }

  .lineage-tooltip .tip-row span:last-child {
    color: var(--text);
    font-weight: 500;
  }

  .lineage-info {
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    font-size: 12px;
    color: var(--text-dim);
    display: none;
    overflow-x: auto;
    white-space: nowrap;
  }

  .lineage-info.visible {
    display: block;
  }

  .lineage-info .path-chain {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .lineage-info .path-node {
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
    font-size: 11px;
    color: var(--bg-card);
  }

  .lineage-info .path-arrow {
    color: var(--text-dim);
    font-size: 11px;
  }

  .lineage-legend {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 50;
    pointer-events: none;
    box-shadow: var(--shadow-sm);
  }

  .lineage-legend .legend-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .lineage-legend .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .lineage-legend .legend-line {
    width: 24px;
    height: 0;
    border-top: 2px solid var(--text-dim);
    flex-shrink: 0;
  }

  .lineage-legend .legend-line.thick {
    border-top-width: 4px;
  }

  @keyframes lineage-dash-flow {
    to { stroke-dashoffset: -20; }
  }

  .lineage-node-label {
    paint-order: stroke;
    stroke: var(--bg-card);
    stroke-width: 3px;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .lineage-node-pulse {
    animation: lineage-pulse 1s ease-in-out infinite;
  }

  @keyframes lineage-pulse {
    0%, 100% { r: var(--base-r); }
    50% { r: calc(var(--base-r) + 3); }
  }

  /* Sharing matrix */
  .sharing-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .sharing-item:last-child { border-bottom: none; }

  .sharing-arrow {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .sharing-details {
    flex: 1;
  }

  .sharing-details .bucket-name {
    font-weight: 600;
    font-size: 13px;
  }

  .sharing-details .project-name {
    font-size: 12px;
    color: var(--text-dim);
  }

  .sharing-details .sharing-type {
    font-size: 11px;
    color: var(--accent);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { width: 60px; min-width: 60px; }
    .sidebar-header h1, .sidebar-header .subtitle,
    .search-box, .nav-group-label, .nav-item .nav-label { display: none; }
    .nav-item { padding: 8px 0; justify-content: center; }
    .main { padding: 16px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Flow diagrams */
  .flow-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .flow-card.disabled { opacity: 0.5; }

  .flow-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }

  .flow-header:hover { background: var(--bg-hover); }

  .flow-title { font-size: 14px; font-weight: 600; flex: 1; }

  .flow-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 12px;
  }

  .flow-body { padding: 0 18px 18px; display: none; }
  .flow-body.open { display: block; }

  .flow-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin: 12px 0;
    white-space: pre-wrap;
    max-height: 100px;
    overflow-y: auto;
    line-height: 1.4;
  }

  .flow-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    margin: 8px 0 12px;
  }

  .flow-link:hover { text-decoration: underline; }

  /* Phase pipeline */
  .phase-pipeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
  }

  .phase-connector {
    width: 2px;
    height: 12px;
    background: var(--border);
    margin-left: 20px;
  }

  .phase-block {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .phase-head {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .phase-head .phase-deps {
    font-weight: 400;
    color: var(--text-dim);
    font-size: 10px;
    margin-left: auto;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .task-row:last-child { border-bottom: none; }
  .task-row:hover { background: var(--bg-hover); }
  .task-row.disabled-task { opacity: 0.35; }

  .task-row a {
    color: var(--text);
    text-decoration: none;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .task-row a:hover { color: var(--accent); text-decoration: underline; }

  .task-type-badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    min-width: 22px;
    text-align: center;
    flex-shrink: 0;
  }

  .task-type-badge.EX { background: rgba(0, 115, 209, 0.1); color: var(--accent); }
  .task-type-badge.WR { background: rgba(16, 183, 127, 0.1); color: var(--green); }
  .task-type-badge.TR { background: rgba(124, 58, 237, 0.1); color: var(--purple); }
  .task-type-badge.AP { background: rgba(245, 159, 10, 0.1); color: var(--orange); }
  .task-type-badge.FL { background: rgba(8, 145, 178, 0.1); color: var(--cyan); }
  .task-type-badge.OT { background: var(--border-light); color: var(--text-dim); }

  .task-comp {
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    font-family: monospace;
  }

  .task-cof {
    font-size: 9px;
    color: var(--orange);
    flex-shrink: 0;
    border: 1px solid var(--orange);
    border-radius: 3px;
    padding: 0 3px;
  }

  /* Config table links */
  .config-link {
    color: var(--text);
    text-decoration: none;
  }
  .config-link:hover { color: var(--accent); text-decoration: underline; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Config description */
  .config-desc {
    font-size: 11px;
    color: var(--text-dim);
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Clickable project links */
  .project-link {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
  }
  .project-link:hover { text-decoration: underline; }

  /* Component stats bar chart */
  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }

  .bar-label {
    width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
    text-align: right;
    color: var(--text-dim);
  }

  .bar-track {
    flex: 1;
    height: 14px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
  }

  .bar-fill-success {
    height: 100%;
    background: var(--green);
    transition: width 0.3s;
  }

  .bar-fill-error {
    height: 100%;
    background: var(--red);
    transition: width 0.3s;
  }

  .bar-value {
    width: 40px;
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  /* Tier summary cards */
  .tier-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .tier-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    border-left: 3px solid;
  }

  .tier-card.l0 { border-left-color: var(--l0); }
  .tier-card.l1 { border-left-color: var(--l1); }
  .tier-card.l2 { border-left-color: var(--l2); }

  .tier-card .tier-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .tier-card .tier-desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .tier-card .tier-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
  }

  .tier-card .tier-stat-value {
    font-weight: 700;
    font-size: 18px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>KBC Explorer</h1>
      <div class="subtitle">Keboola Project Catalog</div>
    </div>
    <div class="search-box">
      <input type="text" id="search" placeholder="Search projects..." autocomplete="off">
    </div>
    <div class="nav-section" id="nav"></div>
  </div>
  <div class="main" id="main"></div>
</div>

<script src="catalog.js"></script>
<script src="orchestrations.js"></script>
<script>
(function() {
  'use strict';

  const $ = id => document.getElementById(id);
  const h = (tag, attrs, ...children) => {
    const el = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'className') el.className = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'innerHTML') el.innerHTML = v;
      else el.setAttribute(k, v);
    });
    children.flat().forEach(c => {
      if (c == null) return;
      el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
    return el;
  };

  // State
  let currentView = 'dashboard';
  let currentProject = null;
  let currentTab = 'flows';

  // Helper functions
  function tierColor(tier) {
    return tier === 'L0' ? 'var(--l0)' : tier === 'L1' ? 'var(--l1)' : 'var(--l2)';
  }

  function healthColor(rate) {
    if (rate >= 95) return 'var(--green)';
    if (rate >= 80) return 'var(--orange)';
    if (rate > 0) return 'var(--red)';
    return 'var(--text-dim)';
  }

  function healthBadge(rate) {
    if (rate >= 95) return 'badge-success';
    if (rate >= 80) return 'badge-warning';
    return 'badge-error';
  }

  function typeBadge(type) {
    const map = {
      extractor: 'badge-extractor',
      writer: 'badge-writer',
      transformation: 'badge-transformation',
      application: 'badge-application'
    };
    return map[type] || 'badge-other';
  }

  function shortComponent(compId) {
    return compId.replace('keboola.', '').replace('ex-generic-v2', 'generic-extractor');
  }

  function formatDuration(seconds) {
    if (!seconds) return '-';
    if (seconds < 60) return `${seconds}s`;
    if (seconds < 3600) return `${Math.round(seconds/60)}m`;
    return `${Math.round(seconds/3600)}h ${Math.round((seconds%3600)/60)}m`;
  }

  function projectLink(alias, fallbackName) {
    const proj = CATALOG.projects[alias];
    const name = proj ? proj.name : (fallbackName || alias || 'Unknown');
    const el = h('span', {className: 'project-link'}, name);
    if (proj) {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        navigateTo('project', alias);
      });
    } else {
      el.style.cursor = 'default';
      el.style.color = 'var(--text)';
    }
    return el;
  }

  // Navigation
  function buildNav(filter) {
    const nav = $('nav');
    nav.innerHTML = '';

    // Dashboard link
    const dashItem = h('div', {
      className: 'nav-special' + (currentView === 'dashboard' ? ' active' : ''),
      onClick: () => navigateTo('dashboard')
    }, 'Dashboard');
    nav.appendChild(dashItem);

    // Lineage link
    const linItem = h('div', {
      className: 'nav-special' + (currentView === 'lineage' ? ' active' : ''),
      onClick: () => navigateTo('lineage')
    }, 'Lineage Graph');
    nav.appendChild(linItem);

    // Matrix link
    const matItem = h('div', {
      className: 'nav-special' + (currentView === 'matrix' ? ' active' : ''),
      onClick: () => navigateTo('matrix')
    }, 'Sharing Matrix');
    nav.appendChild(matItem);

    const filterLc = (filter || '').toLowerCase();

    for (const tier of ['L0', 'L1', 'L2']) {
      const projects = CATALOG.tiers[tier].projects.filter(a =>
        !filterLc || a.includes(filterLc) || CATALOG.projects[a].name.toLowerCase().includes(filterLc)
      );
      if (projects.length === 0 && filterLc) continue;

      const label = h('div', {className: 'nav-group-label'},
        h('span', {className: 'dot', style: `background:${tierColor(tier)}`}),
        `${tier} - ${CATALOG.tiers[tier].name}`,
        h('span', {className: 'count'}, `${projects.length}`)
      );
      nav.appendChild(label);

      for (const alias of projects) {
        const p = CATALOG.projects[alias];
        const rate = p.job_stats?.success_rate_pct ?? -1;
        const color = rate < 0 ? 'var(--text-dim)' : healthColor(rate);
        const shortName = p.name.replace(/^IR L\d\s*[-\[\]]*\s*(\[Data Processes\]\s*)?/, '');

        const item = h('div', {
          className: 'nav-item' + (currentView === 'project' && currentProject === alias ? ' active' : ''),
          onClick: () => navigateTo('project', alias),
          title: p.name
        },
          h('span', {className: 'health', style: `background:${color}`}),
          h('span', {className: 'nav-label'}, shortName)
        );
        nav.appendChild(item);
      }
    }
  }

  function navigateTo(view, project) {
    currentView = view;
    currentProject = project || null;
    currentTab = 'flows';
    buildNav($('search').value);
    renderView();
  }

  // Dashboard view
  function renderDashboard() {
    const main = $('main');
    const projects = Object.values(CATALOG.projects);
    const totalConfigs = projects.reduce((s, p) => s + (p.configurations?.total_configs || 0), 0);
    const totalJobs = projects.reduce((s, p) => s + (p.job_stats?.total_jobs || 0), 0);
    const avgSuccess = projects.filter(p => p.job_stats?.total_jobs > 0)
      .reduce((s, p, _, a) => s + p.job_stats.success_rate_pct / a.length, 0);

    main.innerHTML = '';
    main.appendChild(h('div', {className: 'page-title'}, 'KBC Project Ecosystem'));
    main.appendChild(h('div', {className: 'page-subtitle'},
      `${projects.length} projects across 3 tiers | ${CATALOG.lineage.summary.total_edges} data sharing links | Generated: ${CATALOG.metadata.generated_at}`));

    // KPIs
    const kpiGrid = h('div', {className: 'kpi-grid'});
    const kpis = [
      { label: 'Projects', value: projects.length, detail: `L0: ${CATALOG.tiers.L0.projects.length}, L1: ${CATALOG.tiers.L1.projects.length}, L2: ${CATALOG.tiers.L2.projects.length}` },
      { label: 'Configurations', value: totalConfigs.toLocaleString(), detail: 'Across all projects' },
      { label: 'Recent Jobs', value: totalJobs.toLocaleString(), detail: 'Last 100 per project' },
      { label: 'Avg Success Rate', value: `${avgSuccess.toFixed(1)}%`, detail: 'Weighted by project' },
      { label: 'Lineage Edges', value: CATALOG.lineage.summary.total_edges, detail: `${CATALOG.lineage.summary.projects_sharing_out} sharing out` },
    ];
    for (const kpi of kpis) {
      kpiGrid.appendChild(h('div', {className: 'kpi-card'},
        h('div', {className: 'kpi-label'}, kpi.label),
        h('div', {className: 'kpi-value'}, String(kpi.value)),
        h('div', {className: 'kpi-detail'}, kpi.detail)
      ));
    }
    main.appendChild(kpiGrid);

    // Tier cards
    const tierCards = h('div', {className: 'tier-cards'});
    for (const tier of ['L0', 'L1', 'L2']) {
      const info = CATALOG.tiers[tier];
      const tProjects = info.projects.map(a => CATALOG.projects[a]);
      const tConfigs = tProjects.reduce((s, p) => s + (p.configurations?.total_configs || 0), 0);
      const tSuccess = tProjects.filter(p => p.job_stats?.total_jobs > 0)
        .reduce((s, p, _, a) => s + p.job_stats.success_rate_pct / a.length, 0);

      tierCards.appendChild(h('div', {className: `tier-card ${tier.toLowerCase()}`},
        h('div', {className: 'tier-name'}, `${tier}: ${info.name}`),
        h('div', {className: 'tier-desc'}, info.description),
        h('div', {className: 'tier-stats'},
          h('div', {},
            h('div', {className: 'tier-stat-value'}, String(info.projects.length)),
            h('div', {style: 'color:var(--text-dim);font-size:11px'}, 'Projects')),
          h('div', {},
            h('div', {className: 'tier-stat-value'}, tConfigs.toLocaleString()),
            h('div', {style: 'color:var(--text-dim);font-size:11px'}, 'Configs')),
          h('div', {},
            h('div', {className: 'tier-stat-value', style: `color:${healthColor(tSuccess)}`}, `${tSuccess.toFixed(0)}%`),
            h('div', {style: 'color:var(--text-dim);font-size:11px'}, 'Success'))
        )
      ));
    }
    main.appendChild(tierCards);

    // Projects table
    const section = h('div', {className: 'section'});
    section.appendChild(h('div', {className: 'section-header'}, 'All Projects'));
    const tbody = h('tbody');
    const table = h('table', {},
      h('thead', {}, h('tr', {},
        h('th', {}, 'Tier'),
        h('th', {}, 'Project'),
        h('th', {}, 'Configs'),
        h('th', {}, 'Success Rate'),
        h('th', {}, 'Health'),
        h('th', {}, 'Shares Out'),
        h('th', {}, 'Receives In'),
      )),
      tbody
    );

    for (const alias of [...CATALOG.tiers.L0.projects, ...CATALOG.tiers.L1.projects, ...CATALOG.tiers.L2.projects]) {
      const p = CATALOG.projects[alias];
      const rate = p.job_stats?.success_rate_pct ?? -1;
      const nConfigs = p.configurations?.total_configs || 0;

      const progressBar = h('div', {className: 'progress-bar'},
        h('div', {className: 'fill', style: `width:${rate >= 0 ? rate : 0}%;background:${healthColor(Math.max(0,rate))}`})
      );

      const row = h('tr', {style: 'cursor:pointer', onClick: () => navigateTo('project', alias)},
        h('td', {}, h('span', {className: `badge badge-${p.tier.toLowerCase()}`}, p.tier)),
        h('td', {}, p.name),
        h('td', {}, String(nConfigs)),
        h('td', {style: 'width:150px'},
          h('div', {style: 'display:flex;align-items:center;gap:8px'},
            progressBar,
            h('span', {style: `font-size:12px;color:${healthColor(Math.max(0,rate))}`}, rate >= 0 ? `${rate}%` : 'N/A')
          )
        ),
        h('td', {},
          rate >= 95 ? h('span', {className: 'badge badge-success'}, 'Healthy') :
          rate >= 80 ? h('span', {className: 'badge badge-warning'}, 'Degraded') :
          rate > 0 ? h('span', {className: 'badge badge-error'}, 'Failing') :
          h('span', {className: 'badge badge-other'}, rate === 0 ? 'No jobs' : 'N/A')
        ),
        h('td', {}, String(p.sharing_out?.length || 0)),
        h('td', {}, String(p.sharing_in?.length || 0)),
      );
      tbody.appendChild(row);
    }
    const body = h('div', {className: 'section-body', style: 'padding:0'});
    body.appendChild(table);
    section.appendChild(body);
    main.appendChild(section);
  }

  // Project detail view
  function renderProjectDetail(alias) {
    const main = $('main');
    const p = CATALOG.projects[alias];
    if (!p) { main.innerHTML = '<div class="empty-state">Project not found</div>'; return; }

    main.innerHTML = '';
    main.appendChild(h('div', {style: 'display:flex;align-items:center;gap:12px;margin-bottom:4px'},
      h('span', {className: `badge badge-${p.tier.toLowerCase()}`}, p.tier),
      h('div', {className: 'page-title'}, p.name)
    ));
    main.appendChild(h('div', {className: 'page-subtitle'},
      `Project ID: ${p.project_id} | Alias: ${alias}`));

    // KPIs
    const nConfigs = p.configurations?.total_configs || 0;
    const rate = p.job_stats?.success_rate_pct ?? -1;
    const totalJobs = p.job_stats?.total_jobs || 0;
    const avgDur = p.job_stats?.avg_duration_seconds || 0;

    const kpiGrid = h('div', {className: 'kpi-grid'});
    kpiGrid.appendChild(h('div', {className: 'kpi-card'},
      h('div', {className: 'kpi-label'}, 'Configurations'),
      h('div', {className: 'kpi-value'}, String(nConfigs)),
      h('div', {className: 'kpi-detail'}, Object.entries(p.configurations?.by_type || {}).map(([t,v]) => `${t}: ${v.count}`).join(', ') || '-')
    ));
    kpiGrid.appendChild(h('div', {className: 'kpi-card'},
      h('div', {className: 'kpi-label'}, 'Success Rate'),
      h('div', {className: 'kpi-value', style: `color:${healthColor(Math.max(0,rate))}`}, rate >= 0 ? `${rate}%` : 'N/A'),
      h('div', {className: 'kpi-detail'}, `${totalJobs} recent jobs`)
    ));
    kpiGrid.appendChild(h('div', {className: 'kpi-card'},
      h('div', {className: 'kpi-label'}, 'Avg Duration'),
      h('div', {className: 'kpi-value'}, formatDuration(avgDur)),
      h('div', {className: 'kpi-detail'}, 'Per job run')
    ));
    kpiGrid.appendChild(h('div', {className: 'kpi-card'},
      h('div', {className: 'kpi-label'}, 'Data Sharing'),
      h('div', {className: 'kpi-value'}, `${(p.sharing_out||[]).length} / ${(p.sharing_in||[]).length}`),
      h('div', {className: 'kpi-detail'}, 'Out / In')
    ));
    main.appendChild(kpiGrid);

    // Count flows for this project
    const projectFlows = Object.values(typeof ORCHESTRATIONS !== 'undefined' ? ORCHESTRATIONS : {})
      .filter(o => o.project_alias === alias);
    const activeFlows = projectFlows.filter(o => !o.is_disabled);

    // Tabs
    const tabs = h('div', {className: 'tabs'});
    const tabDefs = [
      {id: 'flows', label: `Flows (${activeFlows.length}/${projectFlows.length})`},
      {id: 'configs', label: `Configurations (${nConfigs})`},
      {id: 'jobs', label: `Job Health (${totalJobs})`},
      {id: 'sharing-out', label: `Sharing Out (${(p.sharing_out||[]).length})`},
      {id: 'sharing-in', label: `Sharing In (${(p.sharing_in||[]).length})`},
    ];
    for (const t of tabDefs) {
      tabs.appendChild(h('div', {
        className: 'tab' + (currentTab === t.id ? ' active' : ''),
        onClick: () => { currentTab = t.id; renderProjectDetail(alias); }
      }, t.label));
    }
    main.appendChild(tabs);

    // Tab content
    if (currentTab === 'flows') renderFlowsTab(main, alias, projectFlows);
    else if (currentTab === 'configs') renderConfigsTab(main, p);
    else if (currentTab === 'jobs') renderJobsTab(main, p);
    else if (currentTab === 'sharing-out') renderSharingTab(main, p.sharing_out || [], 'out');
    else if (currentTab === 'sharing-in') renderSharingTab(main, p.sharing_in || [], 'in');
  }

  function renderConfigsTab(main, p) {
    const byType = p.configurations?.by_type || {};
    const projectId = p.project_id;

    for (const [type, data] of Object.entries(byType)) {
      const section = h('div', {className: 'section'});
      section.appendChild(h('div', {className: 'section-header'},
        h('span', {className: `badge ${typeBadge(type)}`}, type),
        ` (${data.count})`
      ));

      const tbody = h('tbody');
      for (const c of data.configs) {
        const url = kbcConfigUrl(projectId, c.component_id, c.config_id);
        tbody.appendChild(h('tr', {},
          h('td', {},
            h('a', {className: 'config-link', href: url, target: '_blank', rel: 'noopener'}, c.config_name || '-')
          ),
          h('td', {}, h('code', {style: 'font-size:11px;color:var(--text-dim)'}, shortComponent(c.component_id))),
          h('td', {}, h('span', {className: 'config-desc', title: c.config_description}, c.config_description || '-')),
          h('td', {}, h('code', {style: 'font-size:11px;color:var(--text-dim)'}, c.config_id)),
        ));
      }

      const table = h('table', {},
        h('thead', {}, h('tr', {},
          h('th', {}, 'Name'),
          h('th', {}, 'Component'),
          h('th', {}, 'Description'),
          h('th', {}, 'Config ID'),
        )),
        tbody
      );
      const body = h('div', {className: 'section-body', style: 'padding:0'});
      body.appendChild(table);
      section.appendChild(body);
      main.appendChild(section);
    }

    if (Object.keys(byType).length === 0) {
      main.appendChild(h('div', {className: 'empty-state'}, 'No configurations found'));
    }
  }

  function renderJobsTab(main, p) {
    const stats = p.job_stats || {};
    if (!stats.total_jobs) {
      main.appendChild(h('div', {className: 'empty-state'}, 'No job data available'));
      return;
    }

    // Status breakdown
    const statusSection = h('div', {className: 'section'});
    statusSection.appendChild(h('div', {className: 'section-header'}, 'Job Status Breakdown'));
    const statusBody = h('div', {className: 'section-body'});
    const statusCounts = stats.status_counts || {};
    const statusGrid = h('div', {className: 'kpi-grid'});
    for (const [status, count] of Object.entries(statusCounts)) {
      const pct = ((count / stats.total_jobs) * 100).toFixed(1);
      const color = status === 'success' ? 'var(--green)' : status === 'error' ? 'var(--red)' : 'var(--orange)';
      statusGrid.appendChild(h('div', {className: 'kpi-card'},
        h('div', {className: 'kpi-label'}, status),
        h('div', {className: 'kpi-value', style: `color:${color}`}, String(count)),
        h('div', {className: 'kpi-detail'}, `${pct}% of total`)
      ));
    }
    statusBody.appendChild(statusGrid);
    statusSection.appendChild(statusBody);
    main.appendChild(statusSection);

    // Date range
    if (stats.date_range?.earliest) {
      const rangeSection = h('div', {className: 'section'});
      rangeSection.appendChild(h('div', {className: 'section-header'}, 'Time Range'));
      rangeSection.appendChild(h('div', {className: 'section-body'},
        h('div', {style: 'font-size:13px'},
          `From: ${new Date(stats.date_range.earliest).toLocaleString()} `,
          h('br'),
          `To: ${new Date(stats.date_range.latest).toLocaleString()}`
        )
      ));
      main.appendChild(rangeSection);
    }

    // Component stats chart
    const compSection = h('div', {className: 'section'});
    compSection.appendChild(h('div', {className: 'section-header'}, 'Component Health'));
    const chart = h('div', {className: 'bar-chart'});
    const compStats = stats.component_stats || {};
    const maxTotal = Math.max(...Object.values(compStats).map(s => s.total), 1);

    for (const [comp, s] of Object.entries(compStats)) {
      const successW = (s.success / maxTotal) * 100;
      const errorW = (s.error / maxTotal) * 100;

      chart.appendChild(h('div', {className: 'bar-row'},
        h('div', {className: 'bar-label', title: comp}, shortComponent(comp)),
        h('div', {className: 'bar-track'},
          h('div', {className: 'bar-fill-success', style: `width:${successW}%`}),
          h('div', {className: 'bar-fill-error', style: `width:${errorW}%`})
        ),
        h('div', {className: 'bar-value'}, `${s.total}`)
      ));
    }
    compSection.appendChild(h('div', {className: 'section-body'}, chart));
    main.appendChild(compSection);

    // Failing configs
    if (stats.failing_configs?.length > 0) {
      const failSection = h('div', {className: 'section'});
      failSection.appendChild(h('div', {className: 'section-header'},
        h('span', {style: 'color:var(--red)'}, 'Failing Configurations')
      ));

      const tbody = h('tbody');
      for (const fc of stats.failing_configs) {
        tbody.appendChild(h('tr', {},
          h('td', {}, h('code', {style: 'font-size:11px'}, shortComponent(fc.component_id))),
          h('td', {}, h('code', {style: 'font-size:11px;color:var(--text-dim)'}, fc.config_key.split('/')[1] || '')),
          h('td', {}, h('span', {style: 'color:var(--red)'}, String(fc.error_count))),
          h('td', {}, String(fc.total_runs)),
          h('td', {},
            h('span', {className: `badge ${healthBadge(100 - fc.error_rate_pct)}`}, `${fc.error_rate_pct}%`)
          ),
          h('td', {style: 'font-size:11px;color:var(--text-dim)'}, fc.last_run ? new Date(fc.last_run).toLocaleDateString() : '-'),
        ));
      }

      const table = h('table', {},
        h('thead', {}, h('tr', {},
          h('th', {}, 'Component'),
          h('th', {}, 'Config ID'),
          h('th', {}, 'Errors'),
          h('th', {}, 'Total'),
          h('th', {}, 'Error Rate'),
          h('th', {}, 'Last Run'),
        )),
        tbody
      );
      const body = h('div', {className: 'section-body', style: 'padding:0'});
      body.appendChild(table);
      failSection.appendChild(body);
      main.appendChild(failSection);
    }
  }

  function renderSharingTab(main, items, direction) {
    if (items.length === 0) {
      main.appendChild(h('div', {className: 'empty-state'},
        direction === 'out' ? 'This project does not share any data' : 'This project does not receive shared data'));
      return;
    }

    // Group by target/source project
    const grouped = {};
    for (const item of items) {
      const key = direction === 'out' ? item.target_project : item.source_project;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(item);
    }

    for (const [projAlias, shares] of Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0]))) {
      const proj = CATALOG.projects[projAlias];
      const projName = proj?.name || shares[0]?.[direction === 'out' ? 'target_project_name' : 'source_project_name'] || projAlias;
      const tier = proj?.tier;

      const section = h('div', {className: 'section'});
      const headerContent = h('div', {className: 'section-header', style: 'cursor:pointer'},
        direction === 'out' ? '\u2192' : '\u2190',
        ' ',
        tier ? h('span', {className: `badge badge-${tier.toLowerCase()}`}, tier) : null,
        ' '
      );
      headerContent.appendChild(projectLink(projAlias));
      headerContent.appendChild(h('span', {className: 'count', style: 'margin-left:auto;color:var(--text-dim);font-size:12px'}, `${shares.length} buckets`));
      section.appendChild(headerContent);

      const body = h('div', {className: 'section-body'});
      for (const share of shares) {
        const srcBucket = direction === 'out' ? share.bucket : share.source_bucket;
        const tgtBucket = direction === 'out' ? share.target_bucket : share.bucket;

        body.appendChild(h('div', {className: 'sharing-item'},
          h('div', {className: 'sharing-arrow', style: `color:${direction === 'out' ? 'var(--green)' : 'var(--accent)'}`},
            direction === 'out' ? '\u2192' : '\u2190'),
          h('div', {className: 'sharing-details'},
            h('div', {className: 'bucket-name'},
              h('code', {style: 'font-size:12px'}, srcBucket),
              ' \u2192 ',
              h('code', {style: 'font-size:12px'}, tgtBucket)
            ),
            h('div', {className: 'sharing-type'}, share.sharing_type)
          )
        ));
      }
      section.appendChild(body);
      main.appendChild(section);
    }
  }

  // Flows tab
  const KBC_BASE = 'https://connection.us-east4.gcp.keboola.com/admin/projects';

  function kbcConfigUrl(projectId, componentId, configId) {
    // Transformations have their own URL pattern
    if (componentId.includes('transformation')) {
      return `${KBC_BASE}/${projectId}/transformations-v2/${componentId}/${configId}`;
    }
    // Orchestrators / flows
    if (componentId === 'keboola.orchestrator') {
      return `${KBC_BASE}/${projectId}/flows/${configId}`;
    }
    // All other components (extractors, writers, applications)
    return `${KBC_BASE}/${projectId}/components/${componentId}/${configId}`;
  }

  function kbcFlowUrl(projectId, configId) {
    return `${KBC_BASE}/${projectId}/flows/${configId}`;
  }

  function renderFlowsTab(main, alias, flows) {
    if (flows.length === 0) {
      main.appendChild(h('div', {className: 'empty-state'}, 'No orchestrations/flows found'));
      return;
    }

    const projectId = CATALOG.projects[alias]?.project_id;

    // Sort: active first, then by name
    flows.sort((a, b) => {
      if (a.is_disabled !== b.is_disabled) return a.is_disabled ? 1 : -1;
      return a.name.localeCompare(b.name);
    });

    for (const flow of flows) {
      const card = h('div', {className: `flow-card ${flow.is_disabled ? 'disabled' : ''}`});

      // Header
      const header = h('div', {className: 'flow-header'});
      header.appendChild(h('div', {className: 'flow-title'},
        flow.is_disabled ? '[DISABLED] ' : '',
        flow.name
      ));
      header.appendChild(h('div', {className: 'flow-meta'},
        h('span', {}, `${flow.total_phases} phases`),
        h('span', {}, `${flow.total_tasks} tasks`),
        h('span', {}, `v${flow.version}`),
        flow.last_modified_by ? h('span', {}, flow.last_modified_by.split('@')[0]) : null
      ));

      // Body
      const body = h('div', {className: 'flow-body'});

      // Toggle
      header.addEventListener('click', () => {
        body.classList.toggle('open');
      });

      // Link to Keboola UI
      if (projectId) {
        body.appendChild(h('a', {
          className: 'flow-link',
          href: kbcFlowUrl(projectId, flow.config_id),
          target: '_blank',
          rel: 'noopener'
        }, '\u2197 Open in Keboola'));
      }

      // Description
      if (flow.description) {
        body.appendChild(h('div', {className: 'flow-desc'}, flow.description));
      }

      // Phase pipeline
      const pipeline = h('div', {className: 'phase-pipeline'});

      for (let i = 0; i < flow.phases.length; i++) {
        const phase = flow.phases[i];
        if (i > 0) {
          pipeline.appendChild(h('div', {className: 'phase-connector'}));
        }

        const block = h('div', {className: 'phase-block'});

        // Phase header
        const deps = phase.depends_on.length > 0
          ? `after: ${phase.depends_on.map(d => {
              const dep = flow.phases.find(p => p.id === d);
              return dep ? dep.name : `#${d}`;
            }).join(', ')}`
          : 'start';

        block.appendChild(h('div', {className: 'phase-head'},
          `${i + 1}. ${phase.name}`,
          h('span', {className: 'phase-deps'}, deps)
        ));

        // Tasks
        for (const task of phase.tasks) {
          const url = projectId ? kbcConfigUrl(projectId, task.component_id, task.config_id) : null;

          const row = h('div', {className: `task-row ${task.enabled ? '' : 'disabled-task'}`},
            h('span', {className: `task-type-badge ${task.type_icon}`}, task.type_icon),
            url
              ? h('a', {href: url, target: '_blank', rel: 'noopener', title: `${task.component_id} / ${task.config_id}`}, task.name)
              : h('span', {style: 'flex:1'}, task.name),
            h('span', {className: 'task-comp'}, task.component_short),
            task.continue_on_failure ? h('span', {className: 'task-cof', title: 'Continue on failure'}, 'CoF') : null
          );
          block.appendChild(row);
        }

        if (phase.tasks.length === 0) {
          block.appendChild(h('div', {className: 'task-row', style: 'color:var(--text-dim);font-style:italic'}, 'No enabled tasks'));
        }

        pipeline.appendChild(block);
      }

      body.appendChild(pipeline);
      card.appendChild(header);
      card.appendChild(body);
      main.appendChild(card);
    }
  }

  // Lineage graph view - interactive pan/zoom with path tracing
  function renderLineageGraph() {
    const main = $('main');
    main.innerHTML = '';
    main.appendChild(h('div', {className: 'page-title'}, 'Data Lineage Graph'));
    main.appendChild(h('div', {className: 'page-subtitle'},
      `${CATALOG.lineage.summary.total_edges} data sharing connections across the project ecosystem`));

    // --- Toolbar ---
    const toolbar = h('div', {className: 'lineage-toolbar'});
    const btnZoomIn = h('button', {title: 'Zoom In'}, '+');
    const btnZoomOut = h('button', {title: 'Zoom Out'}, '\u2212');
    const btnFit = h('button', {title: 'Fit All', style: 'width:auto;padding:0 10px;font-size:12px'}, 'Fit');
    const btnReset = h('button', {title: 'Reset View', style: 'width:auto;padding:0 10px;font-size:12px'}, 'Reset');
    const searchWrap = h('div', {className: 'lineage-search-wrap'});
    const searchInput = h('input', {className: 'lineage-search', type: 'text', placeholder: 'Search projects, configs, buckets...'});
    const dropdown = h('div', {className: 'lineage-dropdown'});
    searchWrap.appendChild(searchInput);
    searchWrap.appendChild(dropdown);
    toolbar.appendChild(btnZoomIn);
    toolbar.appendChild(btnZoomOut);
    toolbar.appendChild(h('div', {className: 'separator'}));
    toolbar.appendChild(btnFit);
    toolbar.appendChild(btnReset);
    toolbar.appendChild(h('div', {className: 'separator'}));
    toolbar.appendChild(searchWrap);
    main.appendChild(toolbar);

    // --- Container & SVG ---
    const container = h('div', {className: 'lineage-container'});
    const tooltip = h('div', {className: 'lineage-tooltip'});
    container.appendChild(tooltip);

    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    container.appendChild(svg);
    main.appendChild(container);

    // --- Info panel for path tracing ---
    const infoPanel = h('div', {className: 'lineage-info'});
    main.appendChild(infoPanel);

    // --- Build graph data ---
    const nodeSet = new Set();
    const edgeMap = {};

    for (const edge of CATALOG.lineage.edges) {
      nodeSet.add(edge.source_project_alias);
      nodeSet.add(edge.target_project_alias);
      const key = `${edge.source_project_alias}|${edge.target_project_alias}`;
      if (!edgeMap[key]) {
        edgeMap[key] = { source: edge.source_project_alias, target: edge.target_project_alias, buckets: [] };
      }
      edgeMap[key].buckets.push(`${edge.source_bucket_id} \u2192 ${edge.target_bucket_id}`);
    }
    const uniqueEdges = Object.values(edgeMap);

    // Build adjacency lists for BFS path tracing
    const adjOut = {}; // alias -> [target aliases]
    const adjIn = {};  // alias -> [source aliases]
    for (const e of uniqueEdges) {
      if (!adjOut[e.source]) adjOut[e.source] = [];
      if (!adjIn[e.target]) adjIn[e.target] = [];
      adjOut[e.source].push(e.target);
      adjIn[e.target].push(e.source);
    }

    // Count total connections per node for radius sizing
    const connCount = {};
    for (const alias of nodeSet) {
      connCount[alias] = (adjOut[alias]?.length || 0) + (adjIn[alias]?.length || 0);
    }
    const maxConn = Math.max(1, ...Object.values(connCount));

    // --- Build search index: maps search terms to projects ---
    // Each entry: { alias, type: 'project'|'config'|'bucket'|'component', text: matched string }
    const searchIndex = [];
    for (const alias of nodeSet) {
      const proj = CATALOG.projects[alias];
      if (!proj) continue;

      // Project name & alias
      searchIndex.push({ alias, type: 'project', text: proj.name });

      // Configuration names
      if (proj.configurations?.by_type) {
        for (const [typeName, typeData] of Object.entries(proj.configurations.by_type)) {
          if (typeData.configs) {
            for (const cfg of typeData.configs) {
              if (cfg.config_name) {
                searchIndex.push({ alias, type: 'config', text: cfg.config_name });
              }
              if (cfg.component_name) {
                searchIndex.push({ alias, type: 'component', text: cfg.component_name });
              }
            }
          }
        }
      }

      // Sharing out buckets
      if (proj.sharing_out) {
        for (const share of proj.sharing_out) {
          if (share.bucket) {
            searchIndex.push({ alias, type: 'bucket', text: share.bucket });
          }
        }
      }

      // Sharing in buckets
      if (proj.sharing_in) {
        for (const share of proj.sharing_in) {
          if (share.source_bucket) {
            searchIndex.push({ alias, type: 'bucket', text: share.source_bucket });
          }
          if (share.linked_bucket) {
            searchIndex.push({ alias, type: 'bucket', text: share.linked_bucket });
          }
        }
      }
    }

    // Deduplicate component names per project (many configs share same component)
    const compSeen = new Set();
    const searchIndexDeduped = searchIndex.filter(entry => {
      if (entry.type === 'component') {
        const key = `${entry.alias}|${entry.text}`;
        if (compSeen.has(key)) return false;
        compSeen.add(key);
      }
      return true;
    });

    // --- Layout: force-directed simulation with tier columns ---
    const nodes = [];
    let idx = 0;
    const rect = container.getBoundingClientRect();
    const W = rect.width || 900;
    const H = rect.height || 600;
    const MARGIN = 50;

    // Tier column X positions (within a virtual coordinate space)
    const tierX = { L0: W * 0.15, L1: W * 0.45, L2: W * 0.75, EXT: W * 0.95 };

    for (const alias of nodeSet) {
      const proj = CATALOG.projects[alias];
      const tier = proj?.tier || 'EXT';
      const conn = connCount[alias] || 0;
      const nodeRadius = 6 + (conn / maxConn) * 12; // min 6, max 18
      nodes.push({
        alias,
        name: proj?.name || alias,
        tier,
        r: nodeRadius,
        x: tierX[tier] + (Math.random() - 0.5) * W * 0.12,
        y: MARGIN + (idx / nodeSet.size) * (H - MARGIN * 2),
        vx: 0, vy: 0
      });
      idx++;
    }

    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.alias] = n);

    // Improved force simulation
    function simulate(iterations) {
      for (let iter = 0; iter < iterations; iter++) {
        const alpha = 1 - iter / iterations; // cooling factor

        // Repulsion between nodes (stronger to reduce overlap)
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            let dx = nodes[j].x - nodes[i].x;
            let dy = nodes[j].y - nodes[i].y;
            let dist = Math.sqrt(dx * dx + dy * dy) || 1;
            let minDist = nodes[i].r + nodes[j].r + 30;
            let force = 8000 / (dist * dist);
            // Extra push when too close
            if (dist < minDist) force += (minDist - dist) * 0.5;
            let fx = (dx / dist) * force;
            let fy = (dy / dist) * force;
            nodes[i].vx -= fx; nodes[i].vy -= fy;
            nodes[j].vx += fx; nodes[j].vy += fy;
          }
        }

        // Attraction along edges
        for (const e of uniqueEdges) {
          const s = nodeMap[e.source];
          const t = nodeMap[e.target];
          if (!s || !t) continue;
          let dx = t.x - s.x;
          let dy = t.y - s.y;
          let dist = Math.sqrt(dx * dx + dy * dy) || 1;
          let idealDist = 120 + (s.r + t.r);
          let force = (dist - idealDist) * 0.008;
          let fx = (dx / dist) * force;
          let fy = (dy / dist) * force;
          s.vx += fx; s.vy += fy;
          t.vx -= fx; t.vy -= fy;
        }

        // Strong tier column gravity
        for (const n of nodes) {
          const tx = tierX[n.tier] || tierX.EXT;
          n.vx += (tx - n.x) * 0.08;
        }

        // Vertical centering gravity (mild)
        for (const n of nodes) {
          n.vy += (H / 2 - n.y) * 0.003;
        }

        // Apply velocities with damping
        const damping = 0.65 + alpha * 0.1;
        for (const n of nodes) {
          n.vx *= damping; n.vy *= damping;
          n.x += n.vx; n.y += n.vy;
          n.x = Math.max(MARGIN, Math.min(W - MARGIN, n.x));
          n.y = Math.max(MARGIN, Math.min(H - MARGIN, n.y));
        }
      }
    }

    simulate(300);

    // --- SVG Defs: arrow markers & dash animation ---
    const defs = document.createElementNS(ns, 'defs');

    // Normal arrow marker
    const mkNormal = document.createElementNS(ns, 'marker');
    mkNormal.setAttribute('id', 'arrow-normal');
    mkNormal.setAttribute('markerWidth', '8');
    mkNormal.setAttribute('markerHeight', '6');
    mkNormal.setAttribute('refX', '8');
    mkNormal.setAttribute('refY', '3');
    mkNormal.setAttribute('orient', 'auto');
    mkNormal.setAttribute('markerUnits', 'userSpaceOnUse');
    const arrNorm = document.createElementNS(ns, 'path');
    arrNorm.setAttribute('d', 'M0,0 L8,3 L0,6 Z');
    arrNorm.setAttribute('fill', 'rgba(0,115,209,0.3)');
    mkNormal.appendChild(arrNorm);
    defs.appendChild(mkNormal);

    // Highlighted arrow marker
    const mkHighlight = document.createElementNS(ns, 'marker');
    mkHighlight.setAttribute('id', 'arrow-highlight');
    mkHighlight.setAttribute('markerWidth', '10');
    mkHighlight.setAttribute('markerHeight', '7');
    mkHighlight.setAttribute('refX', '10');
    mkHighlight.setAttribute('refY', '3.5');
    mkHighlight.setAttribute('orient', 'auto');
    mkHighlight.setAttribute('markerUnits', 'userSpaceOnUse');
    const arrHi = document.createElementNS(ns, 'path');
    arrHi.setAttribute('d', 'M0,0 L10,3.5 L0,7 Z');
    arrHi.setAttribute('fill', 'var(--accent)');
    mkHighlight.appendChild(arrHi);
    defs.appendChild(mkHighlight);

    svg.appendChild(defs);

    // --- Main transform group for pan/zoom ---
    const gMain = document.createElementNS(ns, 'g');
    svg.appendChild(gMain);

    // --- Tier column separators & labels (inside transform group) ---
    const tierPositions = [
      { tier: 'L0', x: tierX.L0 },
      { tier: 'L1', x: tierX.L1 },
      { tier: 'L2', x: tierX.L2 }
    ];

    for (const tp of tierPositions) {
      // Dashed column separator line
      const sepLine = document.createElementNS(ns, 'line');
      sepLine.setAttribute('x1', tp.x);
      sepLine.setAttribute('y1', 0);
      sepLine.setAttribute('x2', tp.x);
      sepLine.setAttribute('y2', H);
      sepLine.setAttribute('stroke', 'rgba(0,0,0,0.06)');
      sepLine.setAttribute('stroke-width', '1');
      sepLine.setAttribute('stroke-dasharray', '4,4');
      gMain.appendChild(sepLine);

      // Tier header label
      const tierLabel = document.createElementNS(ns, 'text');
      tierLabel.setAttribute('x', tp.x);
      tierLabel.setAttribute('y', 22);
      tierLabel.setAttribute('text-anchor', 'middle');
      tierLabel.setAttribute('font-size', '11');
      tierLabel.setAttribute('font-weight', '600');
      tierLabel.setAttribute('fill', tierColor(tp.tier));
      tierLabel.setAttribute('opacity', '0.7');
      tierLabel.textContent = `${tp.tier}: ${CATALOG.tiers[tp.tier]?.name || tp.tier}`;
      gMain.appendChild(tierLabel);
    }

    // --- Render edges ---
    const edgeElements = [];
    for (const e of uniqueEdges) {
      const s = nodeMap[e.source];
      const t = nodeMap[e.target];
      if (!s || !t) continue;

      // Calculate edge endpoint offset (stop at node boundary)
      const dx = t.x - s.x;
      const dy = t.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const offsetS = s.r + 2;
      const offsetT = t.r + 10; // extra for arrowhead

      const x1 = s.x + (dx / dist) * offsetS;
      const y1 = s.y + (dy / dist) * offsetS;
      const x2 = t.x - (dx / dist) * offsetT;
      const y2 = t.y - (dy / dist) * offsetT;

      const baseWidth = Math.min(4, 1 + e.buckets.length * 0.4);

      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.setAttribute('stroke', 'rgba(0,115,209,0.18)');
      line.setAttribute('stroke-width', baseWidth);
      line.setAttribute('marker-end', 'url(#arrow-normal)');
      line.style.transition = 'opacity 0.3s, stroke 0.3s, stroke-width 0.3s';

      line.dataset.source = e.source;
      line.dataset.target = e.target;
      gMain.appendChild(line);
      edgeElements.push({ el: line, data: e, baseWidth, x1, y1, x2, y2 });
    }

    // --- Render nodes ---
    const nodeElements = [];
    for (const n of nodes) {
      const g = document.createElementNS(ns, 'g');
      g.style.cursor = 'pointer';
      g.dataset.alias = n.alias;

      // Circle
      const circle = document.createElementNS(ns, 'circle');
      circle.setAttribute('cx', n.x);
      circle.setAttribute('cy', n.y);
      circle.setAttribute('r', n.r);
      circle.setAttribute('fill', tierColor(n.tier));
      circle.setAttribute('stroke', 'var(--bg-card)');
      circle.setAttribute('stroke-width', '2');
      circle.style.transition = 'opacity 0.3s, r 0.2s, stroke 0.2s, stroke-width 0.2s';

      // Label with white outline (paint-order trick)
      const proj = CATALOG.projects[n.alias];
      const shortName = n.name.replace(/^IR L\d\s*[-\[\]]*\s*(\[Data Processes\]\s*)?/, '');

      const text = document.createElementNS(ns, 'text');
      text.setAttribute('x', n.x);
      text.setAttribute('y', n.y + n.r + 13);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('fill', 'var(--text)');
      text.setAttribute('font-size', '9');
      text.setAttribute('font-weight', '500');
      text.setAttribute('class', 'lineage-node-label');
      text.style.transition = 'opacity 0.3s';
      text.textContent = shortName;

      g.appendChild(circle);
      g.appendChild(text);
      gMain.appendChild(g);

      nodeElements.push({ el: g, circle, text, data: n, shortName });
    }

    // --- Legend overlay ---
    const legend = h('div', {className: 'lineage-legend'});
    for (const tp of tierPositions) {
      const dot = h('span', {className: 'legend-dot', style: `background:${tierColor(tp.tier)}`});
      legend.appendChild(h('div', {className: 'legend-row'}, dot, `${tp.tier}: ${CATALOG.tiers[tp.tier]?.name || tp.tier}`));
    }
    const smallDot = h('span', {className: 'legend-dot', style: 'width:8px;height:8px;background:var(--text-dim)'});
    legend.appendChild(h('div', {className: 'legend-row'}, smallDot, 'Size = connections'));
    const thinLine = h('span', {className: 'legend-line'});
    legend.appendChild(h('div', {className: 'legend-row'}, thinLine, 'Thin = 1 bucket'));
    const thickLine = h('span', {className: 'legend-line thick'});
    legend.appendChild(h('div', {className: 'legend-row'}, thickLine, 'Thick = many buckets'));
    container.appendChild(legend);

    // ========================================================
    // PAN & ZOOM
    // ========================================================
    let zoom = 1;
    let panX = 0, panY = 0;
    const ZOOM_MIN = 0.3;
    const ZOOM_MAX = 3;
    const ZOOM_STEP = 0.15;
    let isPanning = false;
    let panStartX = 0, panStartY = 0;
    let animFrame = null;

    function applyTransform(animate) {
      if (animate) {
        // Smooth transition
        gMain.style.transition = 'transform 0.3s ease-out';
        setTimeout(() => { gMain.style.transition = ''; }, 320);
      }
      gMain.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
    }

    function zoomTo(newZoom, cx, cy) {
      cx = cx ?? W / 2;
      cy = cy ?? H / 2;
      newZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newZoom));
      // Zoom towards cursor: adjust pan so point under cursor stays fixed
      panX = cx - (cx - panX) * (newZoom / zoom);
      panY = cy - (cy - panY) * (newZoom / zoom);
      zoom = newZoom;
      applyTransform(false);
    }

    function fitAll() {
      if (nodes.length === 0) return;
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const n of nodes) {
        minX = Math.min(minX, n.x - n.r - 20);
        maxX = Math.max(maxX, n.x + n.r + 20);
        minY = Math.min(minY, n.y - n.r - 30);
        maxY = Math.max(maxY, n.y + n.r + 30);
      }
      const gw = maxX - minX;
      const gh = maxY - minY;
      const svgRect = svg.getBoundingClientRect();
      const sw = svgRect.width || W;
      const sh = svgRect.height || H;
      zoom = Math.min(sw / gw, sh / gh, ZOOM_MAX) * 0.9;
      zoom = Math.max(ZOOM_MIN, zoom);
      panX = (sw / 2) - ((minX + gw / 2) * zoom);
      panY = (sh / 2) - ((minY + gh / 2) * zoom);
      applyTransform(true);
    }

    function resetView() {
      zoom = 1;
      panX = 0;
      panY = 0;
      applyTransform(true);
    }

    // Mouse wheel zoom
    svg.addEventListener('wheel', (ev) => {
      ev.preventDefault();
      const r = svg.getBoundingClientRect();
      const cx = ev.clientX - r.left;
      const cy = ev.clientY - r.top;
      const delta = ev.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
      zoomTo(zoom + delta * zoom, cx, cy);
    }, { passive: false });

    // Pan with drag
    svg.addEventListener('mousedown', (ev) => {
      if (ev.target === svg || ev.target.tagName === 'line' || (ev.target.tagName === 'rect')) {
        isPanning = true;
        panStartX = ev.clientX - panX;
        panStartY = ev.clientY - panY;
        container.classList.add('panning');
        ev.preventDefault();
      }
    });

    window.addEventListener('mousemove', (ev) => {
      if (!isPanning) return;
      panX = ev.clientX - panStartX;
      panY = ev.clientY - panStartY;
      if (!animFrame) {
        animFrame = requestAnimationFrame(() => {
          applyTransform(false);
          animFrame = null;
        });
      }
    });

    window.addEventListener('mouseup', () => {
      isPanning = false;
      container.classList.remove('panning');
    });

    // Toolbar buttons
    btnZoomIn.addEventListener('click', () => zoomTo(zoom + ZOOM_STEP * zoom));
    btnZoomOut.addEventListener('click', () => zoomTo(zoom - ZOOM_STEP * zoom));
    btnFit.addEventListener('click', fitAll);
    btnReset.addEventListener('click', () => {
      resetView();
      clearAllHighlights();
    });

    // ========================================================
    // BFS PATH TRACING (upstream + downstream)
    // ========================================================
    let selectedNode = null;

    function bfs(startAlias, adjacency) {
      const visited = new Set();
      const queue = [startAlias];
      visited.add(startAlias);
      while (queue.length > 0) {
        const curr = queue.shift();
        for (const neighbor of (adjacency[curr] || [])) {
          if (!visited.has(neighbor)) {
            visited.add(neighbor);
            queue.push(neighbor);
          }
        }
      }
      return visited;
    }

    function tracePathsFrom(alias) {
      const upstream = bfs(alias, adjIn);
      const downstream = bfs(alias, adjOut);
      const allOnPath = new Set([...upstream, ...downstream]);
      return { upstream, downstream, allOnPath };
    }

    // Build ordered path chains for display
    function buildPathChains(alias, upstream, downstream) {
      const chains = [];

      // Upstream chain: trace back from clicked node
      function traceBack(start, adj) {
        const levels = [[start]];
        let frontier = [start];
        const visited = new Set([start]);
        while (frontier.length > 0) {
          const next = [];
          for (const n of frontier) {
            for (const nb of (adj[n] || [])) {
              if (!visited.has(nb)) {
                visited.add(nb);
                next.push(nb);
              }
            }
          }
          if (next.length > 0) levels.push(next);
          frontier = next;
        }
        return levels;
      }

      const upLevels = traceBack(alias, adjIn).reverse();
      const downLevels = traceBack(alias, adjOut);

      // Merge: upstream levels (without clicked) + clicked + downstream (without clicked)
      const merged = [];
      for (const level of upLevels) {
        for (const a of level) if (a !== alias) merged.push(a);
      }
      merged.push(alias);
      for (const level of downLevels) {
        for (const a of level) if (a !== alias) merged.push(a);
      }

      return merged;
    }

    function highlightPath(alias) {
      selectedNode = alias;
      const { upstream, downstream, allOnPath } = tracePathsFrom(alias);

      // Edges on path
      const edgesOnPath = new Set();
      for (const ee of edgeElements) {
        const onUp = upstream.has(ee.data.source) && upstream.has(ee.data.target);
        const onDown = downstream.has(ee.data.source) && downstream.has(ee.data.target);
        if (onUp || onDown) edgesOnPath.add(ee);
      }

      // Dim non-path nodes
      for (const ne of nodeElements) {
        if (allOnPath.has(ne.data.alias)) {
          ne.el.style.opacity = '1';
          if (ne.data.alias === alias) {
            ne.circle.setAttribute('stroke', tierColor(ne.data.tier));
            ne.circle.setAttribute('stroke-width', '3');
            ne.circle.setAttribute('r', ne.data.r + 3);
          }
        } else {
          ne.el.style.opacity = '0.08';
        }
      }

      // Dim / highlight edges
      for (const ee of edgeElements) {
        if (edgesOnPath.has(ee)) {
          ee.el.setAttribute('stroke', 'var(--accent)');
          ee.el.setAttribute('stroke-width', ee.baseWidth + 2);
          ee.el.setAttribute('marker-end', 'url(#arrow-highlight)');
          ee.el.setAttribute('stroke-dasharray', '6,4');
          ee.el.style.animation = 'lineage-dash-flow 0.8s linear infinite';
          ee.el.style.opacity = '1';
        } else {
          ee.el.style.opacity = '0.05';
        }
      }

      // Show info panel
      const chain = buildPathChains(alias, upstream, downstream);
      infoPanel.innerHTML = '';
      infoPanel.classList.add('visible');
      const pathDiv = h('div', {className: 'path-chain'});
      const upCount = upstream.size - 1;
      const downCount = downstream.size - 1;
      const label = h('span', {style: 'margin-right:8px;font-weight:600;color:var(--text)'}, `Path trace: ${upCount} upstream, ${downCount} downstream`);
      pathDiv.appendChild(label);
      pathDiv.appendChild(h('span', {style: 'margin:0 4px'}, ' | '));

      for (let i = 0; i < chain.length; i++) {
        const a = chain[i];
        const nd = nodeMap[a];
        const span = h('span', {className: 'path-node', style: `background:${tierColor(nd?.tier || 'L0')}`});
        span.textContent = nd?.name?.replace(/^IR L\d\s*[-\[\]]*\s*(\[Data Processes\]\s*)?/, '') || a;
        if (a === alias) span.style.outline = '2px solid var(--text)';
        pathDiv.appendChild(span);
        if (i < chain.length - 1) {
          pathDiv.appendChild(h('span', {className: 'path-arrow'}, '\u2192'));
        }
      }
      infoPanel.appendChild(pathDiv);
    }

    function clearAllHighlights() {
      selectedNode = null;
      for (const ne of nodeElements) {
        ne.el.style.opacity = '1';
        ne.circle.setAttribute('r', ne.data.r);
        ne.circle.setAttribute('stroke', 'var(--bg-card)');
        ne.circle.setAttribute('stroke-width', '2');
      }
      for (const ee of edgeElements) {
        ee.el.setAttribute('stroke', 'rgba(0,115,209,0.18)');
        ee.el.setAttribute('stroke-width', ee.baseWidth);
        ee.el.setAttribute('marker-end', 'url(#arrow-normal)');
        ee.el.removeAttribute('stroke-dasharray');
        ee.el.style.animation = '';
        ee.el.style.opacity = '1';
      }
      infoPanel.classList.remove('visible');
      infoPanel.innerHTML = '';
    }

    // ========================================================
    // HOVER HIGHLIGHTING (1-hop neighbors)
    // ========================================================
    let hoverNode = null;

    function onNodeEnter(ne, ev) {
      if (selectedNode) return; // path trace active, skip hover
      hoverNode = ne.data.alias;

      // Find direct neighbors
      const neighbors = new Set([ne.data.alias]);
      for (const ee of edgeElements) {
        if (ee.data.source === ne.data.alias) neighbors.add(ee.data.target);
        if (ee.data.target === ne.data.alias) neighbors.add(ee.data.source);
      }

      // Dim non-neighbors
      for (const n2 of nodeElements) {
        if (neighbors.has(n2.data.alias)) {
          n2.el.style.opacity = '1';
          if (n2.data.alias === ne.data.alias) {
            n2.circle.setAttribute('r', n2.data.r + 2);
            n2.circle.setAttribute('stroke', tierColor(n2.data.tier));
            n2.circle.setAttribute('stroke-width', '3');
          }
        } else {
          n2.el.style.opacity = '0.15';
        }
      }

      // Dim non-connected edges
      for (const ee of edgeElements) {
        if (ee.data.source === ne.data.alias || ee.data.target === ne.data.alias) {
          ee.el.setAttribute('stroke', 'rgba(0,115,209,0.5)');
          ee.el.setAttribute('stroke-width', ee.baseWidth + 1);
          ee.el.style.opacity = '1';
        } else {
          ee.el.style.opacity = '0.08';
        }
      }

      // Tooltip
      const proj = CATALOG.projects[ne.data.alias];
      if (proj) {
        const configs = proj.configurations?.total_configs || 0;
        const rate = proj.job_stats?.success_rate_pct;
        const rateStr = rate != null ? `${rate.toFixed(1)}%` : 'N/A';
        const sharesOut = (adjOut[ne.data.alias] || []).length;
        const sharesIn = (adjIn[ne.data.alias] || []).length;

        tooltip.innerHTML = `<strong>${proj.name}</strong><br>
          <div class="tip-row"><span>Tier</span><span>${ne.data.tier}</span></div>
          <div class="tip-row"><span>Configs</span><span>${configs}</span></div>
          <div class="tip-row"><span>Success rate</span><span>${rateStr}</span></div>
          <div class="tip-row"><span>Shares out</span><span>${sharesOut}</span></div>
          <div class="tip-row"><span>Shares in</span><span>${sharesIn}</span></div>`;
        tooltip.style.display = 'block';
      }
    }

    function onNodeMove(ev) {
      const cr = container.getBoundingClientRect();
      tooltip.style.left = (ev.clientX - cr.left + 14) + 'px';
      tooltip.style.top = (ev.clientY - cr.top + 14) + 'px';
    }

    function onNodeLeave(ne) {
      if (selectedNode) return;
      hoverNode = null;
      tooltip.style.display = 'none';

      // Restore all
      for (const n2 of nodeElements) {
        n2.el.style.opacity = '1';
        n2.circle.setAttribute('r', n2.data.r);
        n2.circle.setAttribute('stroke', 'var(--bg-card)');
        n2.circle.setAttribute('stroke-width', '2');
      }
      for (const ee of edgeElements) {
        ee.el.setAttribute('stroke', 'rgba(0,115,209,0.18)');
        ee.el.setAttribute('stroke-width', ee.baseWidth);
        ee.el.style.opacity = '1';
      }
    }

    // ========================================================
    // NODE EVENT HANDLERS
    // ========================================================
    let clickTimer = null;

    for (const ne of nodeElements) {
      ne.el.addEventListener('mouseenter', (ev) => onNodeEnter(ne, ev));
      ne.el.addEventListener('mousemove', onNodeMove);
      ne.el.addEventListener('mouseleave', () => onNodeLeave(ne));

      // Single click = path trace, double click = navigate
      ne.el.addEventListener('click', (ev) => {
        ev.stopPropagation();
        if (clickTimer) {
          clearTimeout(clickTimer);
          clickTimer = null;
          // Double click: navigate
          navigateTo('project', ne.data.alias);
          return;
        }
        clickTimer = setTimeout(() => {
          clickTimer = null;
          tooltip.style.display = 'none';
          if (selectedNode === ne.data.alias) {
            clearAllHighlights();
          } else {
            clearAllHighlights();
            highlightPath(ne.data.alias);
          }
        }, 250);
      });
    }

    // Click empty space = clear highlights
    svg.addEventListener('click', (ev) => {
      if (ev.target === svg || ev.target.tagName === 'line' || ev.target.tagName === 'rect') {
        if (!isPanning && selectedNode) {
          clearAllHighlights();
        }
      }
    });

    // ========================================================
    // SEARCH & FOCUS (with deep index: configs, buckets, components)
    // ========================================================
    let searchTimeout = null;
    let ddActiveIdx = -1;
    let ddItems = []; // current dropdown items (DOM elements)

    function searchAndShowResults(q) {
      if (!q) {
        dropdown.classList.remove('open');
        dropdown.innerHTML = '';
        clearAllHighlights();
        ddItems = [];
        ddActiveIdx = -1;
        return;
      }

      // Search the index
      const results = []; // { alias, type, text, matchSnippet }
      const seen = new Map(); // alias -> best match type priority

      // Priority: project > config > bucket > component
      const typePriority = { project: 0, config: 1, bucket: 2, component: 3 };

      for (const entry of searchIndexDeduped) {
        if (entry.text.toLowerCase().includes(q)) {
          const existing = results.find(r => r.alias === entry.alias && r.type === entry.type && r.text === entry.text);
          if (!existing) {
            results.push(entry);
          }
        }
      }

      // Also check alias directly (not in index)
      for (const alias of nodeSet) {
        if (alias.toLowerCase().includes(q) && !results.some(r => r.alias === alias && r.type === 'project')) {
          const proj = CATALOG.projects[alias];
          if (proj) results.push({ alias, type: 'project', text: proj.name });
        }
      }

      // Group by type, then deduplicate projects within each group
      const groups = { project: [], config: [], bucket: [], component: [] };
      for (const r of results) {
        groups[r.type]?.push(r);
      }

      // Limit results per group to keep dropdown manageable
      const MAX_PER_GROUP = 8;
      for (const type of Object.keys(groups)) {
        groups[type] = groups[type].slice(0, MAX_PER_GROUP);
      }

      // Get unique matching project aliases
      const matchAliases = new Set(results.map(r => r.alias));

      // Highlight matching nodes in graph
      selectedNode = null;
      for (const ne of nodeElements) {
        if (matchAliases.has(ne.data.alias)) {
          ne.el.style.opacity = '1';
          ne.circle.setAttribute('stroke', tierColor(ne.data.tier));
          ne.circle.setAttribute('stroke-width', '3');
        } else {
          ne.el.style.opacity = '0.08';
        }
      }
      for (const ee of edgeElements) {
        if (matchAliases.has(ee.data.source) || matchAliases.has(ee.data.target)) {
          ee.el.style.opacity = '0.4';
        } else {
          ee.el.style.opacity = '0.05';
        }
      }

      // Build dropdown
      dropdown.innerHTML = '';
      ddItems = [];
      ddActiveIdx = -1;

      const groupLabels = {
        project: 'Projects',
        config: 'Configurations',
        bucket: 'Buckets',
        component: 'Components'
      };

      let totalShown = 0;
      for (const type of ['project', 'config', 'bucket', 'component']) {
        if (groups[type].length === 0) continue;

        dropdown.appendChild(h('div', {className: 'dd-group-label'}, groupLabels[type]));

        for (const r of groups[type]) {
          const proj = CATALOG.projects[r.alias];
          const shortName = (proj?.name || r.alias).replace(/^IR L\d\s*[-\[\]]*\s*(\[Data Processes\]\s*)?/, '');
          const tier = proj?.tier || 'L0';

          const item = h('div', {className: 'dd-item'});
          item.appendChild(h('span', {className: 'dd-tier', style: `background:${tierColor(tier)}`}, tier));
          item.appendChild(h('span', {className: 'dd-project'}, shortName));

          // Show what matched (for non-project matches)
          if (type !== 'project') {
            // Highlight the matching portion
            const matchText = r.text;
            const lIdx = matchText.toLowerCase().indexOf(q);
            let displayText = matchText;
            if (lIdx >= 0) {
